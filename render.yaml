
services:
  - type: web
    name: ma-web
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ma-db
          property: connectionString
    autoDeploy: true

databases:
  - name: ma-db
    databaseName: ma
    user: ma_user
    plan: free
