<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Actuator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="hand.png" type="image/x-icon">
</head>
<body>
<div id="table">
    <h1>List of Manual Actuators</h1>
    <div id="badge-container" style="
  position: absolute;
  top: 16px;
  right: 20px;
  text-align: right;
  line-height: 1.15;
">
  <!-- Your existing label -->
  <span id="made-by" style="
    background: #fffb8a; 
    padding: 2px 6px; 
    border-radius: 4px; 
    font-weight: 600;
    display: inline-block;
    margin-bottom: 4px;
  ">
    CJ Condada
  </span>
  <!-- Barcode (SVG) -->
  <div>
    <svg id="idBarcode"></svg>
  </div>
  <!-- Watermark text -->
  <div id="watermark" style="
    font-size: 10px; 
    color: #888; 
    margin-top: 2px;
  ">
    ID: CJ-MA-2026-02-28
  </div>
</div>
    <button onclick="addRow()">➕ Add Row</button>
    <button onclick="removeRow()">➖ Remove Last Row</button>
    <table class="dataframe" style="width:90%" id="editableTable">
        <thead>
            <tr style="text-align: center;">
                <th>NAME</th>
                <th>DESCRIPTION</th>
                <th>BARCODE</th>
                <th>REMARKS</th>
            </tr>
        </thead>
        <tbody>
            <!-- Table rows will be generated by JS -->
        </tbody>
    </table>
</div>
<div id="output"></div>
<script>
  let nextIndex = 0;

  function getEditorName() {
    let name = localStorage.getItem('editorName');
    if (!name) {
      name = prompt('Enter your name (for change tracking):') || 'unknown';
      localStorage.setItem('editorName', name);
    }
    return name;
  }

  function updateNextIndex() {
    const cells = document.querySelectorAll("#editableTable td[data-index]");
    let maxFound = -1;
    cells.forEach(cell => {
      const idx = parseInt(cell.getAttribute('data-index'), 10);
      if (!Number.isNaN(idx) && idx > maxFound) maxFound = idx;
    });
    nextIndex = maxFound + 1;
  }

  // Load data and rebuild table
  async function loadData() {
    const table = document.getElementById("editableTable");
    const tbody = table.querySelector('tbody');

    // 1) Collect existing HTML values using numeric keys ("0","1"...)
    const existingData = {};
    document.querySelectorAll("#editableTable td[data-index]").forEach(cell => {
      const k = String(cell.getAttribute('data-index'));
      existingData[k] = cell.innerText;
    });

    // 2) Fetch DB data (already normalized to numeric keys by /api/data)
    let dbData = {};
    try {
      const res = await fetch('/api/data');
      dbData = await res.json();
    } catch (err) {
      console.error('Error loading /api/data:', err);
    }

    // 3) Merge, prefer DB over stale HTML
    const mergedData = { ...existingData, ...dbData };

    // 4) Rebuild table
    tbody.innerHTML = "";

    const columns = table.querySelectorAll('thead th').length; // 4
    const allKeys = Object.keys(mergedData)
      .map(k => parseInt(k, 10))
      .filter(n => !Number.isNaN(n));
    const maxIndex = allKeys.length > 0 ? Math.max(...allKeys) : -1;
    const rowCount = Math.ceil((maxIndex + 1) / columns);

    for (let r = 0; r < rowCount; r++) {
      const tr = document.createElement('tr');
      for (let c = 0; c < columns; c++) {
        const cellIndex = r * columns + c;             // numeric index
        const td = document.createElement('td');
        td.setAttribute('data-index', cellIndex);
        td.innerText = mergedData[String(cellIndex)] || "";
        td.ondblclick = () => editCell(td);
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }

    nextIndex = (rowCount * columns);

    // ❌ IMPORTANT: do NOT auto-save here—this can overwrite DB with blanks.
    // saveData();  <-- removed
  }

  // Bulk save all cells (sends editedBy)
  async function saveData() {
    const editedBy = getEditorName();
    const cells = document.querySelectorAll("#editableTable td[data-index]");
    for (const cell of cells) {
      const index = cell.getAttribute('data-index');
      const value = cell.innerText;
      await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ index, value, editedBy })
      });
    }
  }

  function editCell(td) {
    const currentText = td.innerText;
    const input = document.createElement("input");
    input.type = "text";
    input.value = currentText;
    td.innerHTML = "";
    td.appendChild(input);
    input.focus();

    input.addEventListener("blur", () => saveEdit(td, input.value));
    input.addEventListener("keydown", e => { if (e.key === "Enter") input.blur(); });
  }

  async function saveEdit(td, newValue) {
    const index = td.getAttribute('data-index');
    td.innerText = newValue;

    const editedBy = getEditorName();
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ index, value: newValue, editedBy })
    });
    try {
      const json = await res.json();
      console.log('saveEdit:', json);
    } catch {}
  }

  function makeAllCellsEditable() {
    document.querySelectorAll('#editableTable td[data-index]').forEach(cell => {
      cell.ondblclick = () => editCell(cell);
    });
  }

  // Add a full blank row (and immediately persist blanks with editedBy)
  async function addRow() {
    const table = document.getElementById("editableTable");
    const columnCount = table.querySelectorAll('thead th').length;
    const tbody = table.querySelector('tbody');
    const newRow = tbody.insertRow(-1);
    const editedBy = getEditorName();

    for (let i = 0; i < columnCount; i++) {
      const newCell = newRow.insertCell(i);
      newCell.setAttribute("data-index", nextIndex++);
      newCell.ondblclick = () => editCell(newCell);
      newCell.innerText = "";

      await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          index: newCell.getAttribute('data-index'),
          value: "",
          editedBy
        })
      });
    }
  }

  function removeRow() {
    const table = document.getElementById("editableTable");
    const tbody = table.tBodies[0];
    if (tbody.rows.length > 0) {
      tbody.deleteRow(-1);
      updateNextIndex();
    } else {
      alert("No more rows to remove.");
    }
  }

  window.onload = function () {
    updateNextIndex();
    loadData();
    makeAllCellsEditable();
  };
</script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

      name = prompt('Enter your name (for change tracking):') || 'unknown';
      localStorage.setItem('editorName', name);
    }
    return name;
  }

  // Example usage:
  async function saveCell(index, value) {
    const editedBy = getEditorName();
    const resp = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ index, value, editedBy })
    });
    console.log(await resp.json());
  }
</script>

<script>
  // === CONFIG: set the unique string you want to encode ===
  // You can later switch this to a dynamic value (date, version, etc.)
  const UNIQUE_ID = "CJ-MA-2026-02-28";

  // Render the barcode
  // Options: https://github.com/lindell/JsBarcode
  JsBarcode("#idBarcode", UNIQUE_ID, {
    format: "CODE128",   // widely readable barcode symbology
    width: 1,            // bar thickness; try 1–2
    height: 42,          // barcode height in px
    margin: 0,           // remove outer whitespace
    displayValue: false  // hide human-readable text (we add our own watermark below)
  });

  // Set the watermark text under the barcode
  document.getElementById("watermark").textContent = `ID: ${UNIQUE_ID}`;
</script>
</body>

</html>
