<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Actuators</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="hand.png" type="image/x-icon" />
</head>

<body>
  <div id="table">
    <h1>List of Manual Actuators</h1>

    <!-- Badge / Barcode -->
    <div id="badge-container" style="
      position: absolute;
      top: 16px;
      right: 20px;
      text-align: right;
      line-height: 1.15;
    ">
      <span id="made-by" style="
        background: #fffb8a;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 600;
        display: inline-block;
        margin-bottom: 4px;
      ">CJ Condada</span>

      <div>
        <svg id="idBarcode"></svg>
      </div>

      <div id="watermark" style="font-size: 10px; color: #888;">
        ID: CJ-MA-2026-02-28
      </div>
    </div>

    <button onclick="addRow()">➕ Add Row</button>
    <button onclick="removeRow()">➖ Remove Last Row</button>

    <table class="dataframe" style="width:90%" id="editableTable">
      <thead>
        <tr>
          <th>NAME</th>
          <th>DESCRIPTION</th>
          <th>BARCODE</th>
          <th>REMARKS</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- Rows generated by JS -->
      </tbody>
    </table>
  </div>

  <!-- =========================
       Frontend Logic
  ========================== -->
  <script>
const COLUMNS = 4;
let nextIndex = 0;

async function loadData() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  let raw = {};
  try {
    const res = await fetch('/api/data');
    raw = await res.json();
  } catch (e) {
    console.error(e);
    return;
  }

  // ✅ Normalize keys: "cell17" → 17
  const data = {};
  for (const [k, v] of Object.entries(raw)) {
    const num = Number(String(k).replace(/\D+/g, ''));
    if (!Number.isNaN(num) && v !== "") {
      data[num] = v;
    }
  }

  const indices = Object.keys(data).map(Number);
  if (!indices.length) return;

  const maxIndex = Math.max(...indices);
  const rowCount = Math.ceil((maxIndex + 1) / COLUMNS);

  for (let r = 0; r < rowCount; r++) {
    const start = r * COLUMNS;

    // ✅ ONLY render rows that have at least one value
    let hasData = false;
    for (let c = 0; c < COLUMNS; c++) {
      if (data[start + c]) {
        hasData = true;
        break;
      }
    }
    if (!hasData) continue;

    const tr = document.createElement('tr');

    for (let c = 0; c < COLUMNS; c++) {
      const idx = start + c;
      const td = document.createElement('td');
      td.dataset.index = idx;
      td.textContent = data[idx] || '';
      td.ondblclick = () => editCell(td);
      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  }

  nextIndex = rowCount * COLUMNS;
}

document.addEventListener('DOMContentLoaded', loadData);
</script>


  <!-- =========================
       Barcode
  ========================== -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script>
    const UNIQUE_ID = "CJ-MA-2026-02-28";
    JsBarcode("#idBarcode", UNIQUE_ID, {
      format: "CODE128",
      width: 1,
      height: 42,
      margin: 0,
      displayValue: false
    });
    document.getElementById("watermark").textContent = `ID: ${UNIQUE_ID}`;
  </script>
</body>
</html>
