<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Actuators</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="hand.png" type="image/x-icon" />

  <style>
    .dataframe td {
      cursor: pointer;
      user-select: text;
    }
    #badge-container {
      pointer-events: none;
    }
    input {
      font-size: inherit;
      font-family: inherit;
    }
  </style>
</head>

<body>
  <div id="table">
    <h1>List of Manual Actuators</h1>

    <!-- Badge / Barcode -->
    <div id="badge-container" style="
      position:absolute;
      top:16px;
      right:20px;
      text-align:right;
    ">
      <span style="
        background:#fffb8a;
        padding:2px 6px;
        border-radius:4px;
        font-weight:600;
        display:inline-block;
      ">CJ Condada</span>

      <div><svg id="idBarcode"></svg></div>
      <div id="watermark" style="font-size:10px;color:#888;"></div>
    </div>

    <button onclick="addRow()">➕ Add Row</button>
    <button onclick="removeRow()">➖ Remove Last Row</button>

    <table class="dataframe" style="width:90%" id="editableTable">
      <thead>
        <tr>
          <th>NAME</th>
          <th>DESCRIPTION</th>
          <th>BARCODE</th>
          <th>REMARKS</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- ✅ Inject AUTH_TOKEN from server -->
  <script src="/config.js"></script>

  <!-- =======================
       App Logic
  ======================== -->
  <script>
    const COLUMNS = 4;
    let nextIndex = 0;

    function getEditorName() {
      let name = localStorage.getItem('editorName');
      if (!name) {
        name = prompt('Enter your name (for change tracking):') || 'unknown';
        localStorage.setItem('editorName', name);
      }
      return name;
    }

    function authHeaders() {
      return window.AUTH_TOKEN
        ? { Authorization: 'Bearer ' + window.AUTH_TOKEN }
        : {};
    }

    async function loadData() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      let raw = {};
      try {
        const res = await fetch('/api/data');
        raw = await res.json();
      } catch (e) {
        console.error(e);
        return;
      }

      // Normalize keys: cells#12 → 12
      const data = {};
      for (const [k, v] of Object.entries(raw)) {
        const n = Number(String(k).replace(/\D+/g, ''));
        if (!Number.isNaN(n) && v !== '') data[n] = v;
      }

      const indices = Object.keys(data).map(Number);
      if (!indices.length) return;

      const maxIndex = Math.max(...indices);
      const rowCount = Math.ceil((maxIndex + 1) / COLUMNS);

      for (let r = 0; r < rowCount; r++) {
        const base = r * COLUMNS;

        let hasData = false;
        for (let c = 0; c < COLUMNS; c++) {
          if (data[base + c]) hasData = true;
        }
        if (!hasData) continue;

        const tr = document.createElement('tr');

        for (let c = 0; c < COLUMNS; c++) {
          const idx = base + c;
          const td = document.createElement('td');
          td.dataset.index = idx;
          td.textContent = data[idx] || '';
          td.ondblclick = () => editCell(td);
          tr.appendChild(td);
        }

        tbody.appendChild(tr);
      }

      nextIndex = rowCount * COLUMNS;
    }

    function editCell(td) {
      if (td.querySelector('input')) return;

      const oldVal = td.textContent;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = oldVal;
      input.style.width = '100%';

      td.textContent = '';
      td.appendChild(input);
      setTimeout(() => input.focus(), 0);

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') td.textContent = oldVal;
      });

      input.addEventListener('blur', async () => {
        const newVal = input.value;
        td.textContent = newVal;

        await fetch('/api/save', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...authHeaders()
          },
          body: JSON.stringify({
            index: Number(td.dataset.index),
            value: newVal,
            editedBy: getEditorName()
          })
        });
      });
    }

    async function addRow() {
      const tbody = document.getElementById('tableBody');
      const tr = document.createElement('tr');
      const editor = getEditorName();

      for (let c = 0; c < COLUMNS; c++) {
        const td = document.createElement('td');
        td.dataset.index = nextIndex++;
        td.textContent = '';
        td.ondblclick = () => editCell(td);
        tr.appendChild(td);

        await fetch('/api/save', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...authHeaders()
          },
          body: JSON.stringify({
            index: Number(td.dataset.index),
            value: '',
            editedBy: editor
          })
        });
      }

      tbody.appendChild(tr);
    }

    function removeRow() {
      const tbody = document.getElementById('tableBody');
      if (!tbody.rows.length) return;
      tbody.deleteRow(-1);
      nextIndex -= COLUMNS;
    }

    document.addEventListener('DOMContentLoaded', loadData);
  </script>

  <!-- =======================
       Barcode
  ======================== -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script>
    const UNIQUE_ID = "CJ-MA-2026-02-28";
    JsBarcode("#idBarcode", UNIQUE_ID, {
      format: "CODE128",
      width: 1,
      height: 42,
      margin: 0,
      displayValue: false
    });
    document.getElementById('watermark').textContent = `ID: ${UNIQUE_ID}`;
  </script>
</body>
</html>
