<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Actuators</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="hand.png" type="image/x-icon" />

  <style>
    .dataframe td {
      cursor: pointer;
      user-select: text;
    }
    #badge-container {
      pointer-events: none;
    }
    input {
      font-size: inherit;
      font-family: inherit;
    }
  </style>
</head>

<body>
  <div id="table">
    <h1>List of Manual Actuators</h1>

    <!-- Badge / Barcode -->
    <div id="badge-container" style="
      position:absolute;
      top:16px;
      right:20px;
      text-align:right;
    ">
      <span id="editorBadge" style="
        background:#fffb8a;
        padding:2px 6px;
        border-radius:4px;
        font-weight:600;
        display:inline-block;
      ">No User</span>

      <div><svg id="idBarcode"></svg></div>
      <div id="watermark" style="font-size:10px;color:#888;"></div>
    </div>

    <button onclick="addRow()">➕ Add Row</button>
    <button onclick="removeRow()">➖ Remove Last Row</button>

    <table class="dataframe" style="width:90%" id="editableTable">
      <thead>
        <tr>
          <th>NAME</th>
          <th>DESCRIPTION</th>
          <th>BARCODE</th>
          <th>REMARKS</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- ✅ Inject AUTH_TOKEN from server -->
 

  <!-- =======================
       App Logic
  ======================== -->
  <script>
  const COLUMNS = 4;
  let nextIndex = 0;

  async function getEditorName() {
  let name = localStorage.getItem("editorName");
  if (name && name.trim()) return name.trim();

  while (true) {
    name = (prompt("Enter your name (must be authorized):") || "").trim();

    if (!name) {
      alert("Name is required to edit.");
      continue;
    }

    // Save locally so they don't retype each edit
    localStorage.setItem("editorName", name);
    return name;
  }
}


  function ensureAuthToken() {
    let t = localStorage.getItem("authToken");
    if (!t) {
      t = prompt("Enter AUTH token (required for edits):") || "";
      t = t.trim();
      if (t) localStorage.setItem("authToken", t);
    }
    return t;
  }

  function authHeaders() {
    const t = localStorage.getItem("authToken") || "";
    return t ? { Authorization: "Bearer " + t } : {};
  }

  async function loadData() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    let raw = {};
    try {
      const res = await fetch("/api/data", { cache: "no-store" });
      raw = await res.json();
    } catch (e) {
      console.error("Failed to load /api/data", e);
      return;
    }

    const keys = Object.keys(raw)
      .map(k => Number(k))
      .filter(n => Number.isInteger(n));

    if (!keys.length) {
      nextIndex = 0;
      return;
    }

    const maxIndex = Math.max(...keys);
    const rowCount = Math.ceil((maxIndex + 1) / COLUMNS);

    for (let r = 0; r < rowCount; r++) {
      const tr = document.createElement("tr");
      const base = r * COLUMNS;

      for (let c = 0; c < COLUMNS; c++) {
        const idx = base + c;
        const td = document.createElement("td");
        td.dataset.index = idx;

        td.textContent = Object.prototype.hasOwnProperty.call(raw, String(idx))
          ? raw[String(idx)]
          : "";

        td.ondblclick = () => editCell(td);
        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }

    nextIndex = rowCount * COLUMNS;
  }

  function editCell(td) {
    if (td.querySelector("input")) return;

    const oldVal = td.textContent;
    const input = document.createElement("input");
    input.type = "text";
    input.value = oldVal;
    input.style.width = "100%";

    td.textContent = "";
    td.appendChild(input);
    setTimeout(() => input.focus(), 0);

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") input.blur();
      if (e.key === "Escape") td.textContent = oldVal;
    });

    input.addEventListener("blur", async () => {
      const newVal = input.value;
      td.textContent = newVal;

      // ✅ Ensure token exists BEFORE writing
      const token = ensureAuthToken();
      if (!token) {
        alert("AUTH token is required to edit.");
        td.textContent = oldVal;
        return;
      }

      // ✅ Must await editor
      const editedBy = await getEditorName();

      try {
        const res = await fetch("/api/save", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...authHeaders(),
          },
          body: JSON.stringify({
            index: Number(td.dataset.index),
            value: newVal,
            editedBy,
          }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          alert(err.error || "Save failed");
          td.textContent = oldVal; // rollback UI
        }
      } catch (e) {
        console.error(e);
        alert("Network error while saving.");
        td.textContent = oldVal; // rollback UI
      }
    });
  }

  async function addRow() {
    const token = ensureAuthToken();
    if (!token) return;

    const editor = await getEditorName();

    const tbody = document.getElementById("tableBody");
    const tr = document.createElement("tr");

    const tds = [];
    for (let c = 0; c < COLUMNS; c++) {
      const td = document.createElement("td");
      td.dataset.index = nextIndex++;
      td.textContent = "";
      td.ondblclick = () => editCell(td);
      tr.appendChild(td);
      tds.push(td);
    }
    tbody.appendChild(tr);

    try {
      const saves = tds.map(td =>
        fetch("/api/save", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...authHeaders(),
          },
          body: JSON.stringify({
            index: Number(td.dataset.index),
            value: "",
            editedBy: editor,
          }),
        })
      );

      const results = await Promise.all(saves);
      const bad = results.find(r => !r.ok);
      if (bad) {
        const err = await bad.json().catch(() => ({}));
        alert(err.error || "Save failed");
      }
    } catch (e) {
      console.error(e);
      alert("Network error while adding row.");
    }
  }

  async function removeRow() {
    const token = ensureAuthToken();
    if (!token) return;

    const editor = await getEditorName();

    const tbody = document.getElementById("tableBody");
    if (!tbody.rows.length) return;

    const startIndex = nextIndex - COLUMNS;

    try {
      const res = await fetch("/api/deleteRange", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...authHeaders(),
        },
        body: JSON.stringify({
          startIndex,
          count: COLUMNS,
          editedBy: editor,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        alert(err.error || "Delete failed");
        return;
      }

      tbody.deleteRow(-1);
      nextIndex -= COLUMNS;
    } catch (e) {
      console.error(e);
      alert("Network error while deleting row.");
    }
  }

  // ✅ Make functions available to inline onclick=""
  window.addRow = addRow;
  window.removeRow = removeRow;

  document.addEventListener("DOMContentLoaded", () => {
  loadData();
  updateEditorBadge();
});

</script>

  <!-- =======================
       Barcode
  ======================== -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script>
    function updateEditorBadge() {
  const el = document.getElementById("editorBadge");
  if (!el) return;

  const name = (localStorage.getItem("editorName") || "").trim();
  el.textContent = name || "No User";
}
  </script>
  <script>
    const UNIQUE_ID = "CJ-MA-2026-02-28";
    JsBarcode("#idBarcode", UNIQUE_ID, {
      format: "CODE128",
      width: 1,
      height: 42,
      margin: 0,
      displayValue: false
    });
    document.getElementById('watermark').textContent = `ID: ${UNIQUE_ID}`;
  </script>
</body>
</html>
