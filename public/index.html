<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Actuators</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="hand.png" type="image/x-icon" />
</head>

<body>
  <div id="table">
    <h1>List of Manual Actuators</h1>

    <!-- Badge / Barcode -->
    <div id="badge-container" style="
      position: absolute;
      top: 16px;
      right: 20px;
      text-align: right;
      line-height: 1.15;
    ">
      <span id="made-by" style="
        background: #fffb8a;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 600;
        display: inline-block;
        margin-bottom: 4px;
      ">CJ Condada</span>

      <div>
        <svg id="idBarcode"></svg>
      </div>

      <div id="watermark" style="font-size: 10px; color: #888;">
        ID: CJ-MA-2026-02-28
      </div>
    </div>

    <button onclick="addRow()">➕ Add Row</button>
    <button onclick="removeRow()">➖ Remove Last Row</button>

    <table class="dataframe" style="width:90%" id="editableTable">
      <thead>
        <tr>
          <th>NAME</th>
          <th>DESCRIPTION</th>
          <th>BARCODE</th>
          <th>REMARKS</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- Rows generated by JS -->
      </tbody>
    </table>
  </div>

  <!-- =========================
       Frontend Logic
  ========================== -->
  <script>
    let nextIndex = 0;
    const COLUMNS = 4;

    function getEditorName() {
      let name = localStorage.getItem('editorName');
      if (!name) {
        name = prompt('Enter your name (for change tracking):') || 'unknown';
        localStorage.setItem('editorName', name);
      }
      return name;
    }

    async function loadData() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      let data = {};
      try {
        const res = await fetch('/api/data');
        data = await res.json();
      } catch (e) {
        console.error('Failed to load data:', e);
      }

      const entries = Object.entries(data)
          .map(([k, v]) => {
    const num = Number(String(k).replace(/\D+/g, '')); // ✅ extract digits
    return Number.isNaN(num) ? null : [num, v];
      })
      .filter(Boolean)
      .sort((a, b) => a[0] - b[0]);

      const maxIndex = entries.length
        ? Math.max(...entries.map(e => e[0]))
        : -1;

      const rowCount = Math.ceil((maxIndex + 1) / COLUMNS);

      for (let r = 0; r < rowCount; r++) {
        const tr = document.createElement('tr');

        for (let c = 0; c < COLUMNS; c++) {
          const cellIndex = r * COLUMNS + c;
          const td = document.createElement('td');
          td.dataset.index = cellIndex;
          td.textContent = data[cellIndex] || '';
          td.ondblclick = () => editCell(td);
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }

      nextIndex = rowCount * COLUMNS;
    }

    function editCell(td) {
      const oldValue = td.textContent;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = oldValue;
      td.textContent = '';
      td.appendChild(input);
      input.focus();

      input.onblur = () => saveEdit(td, input.value);
      input.onkeydown = e => { if (e.key === 'Enter') input.blur(); };
    }

    async function saveEdit(td, value) {
      const index = Number(td.dataset.index);
      td.textContent = value;

      await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          index,
          value,
          editedBy: getEditorName()
        })
      });
    }

    async function addRow() {
      const tbody = document.getElementById('tableBody');
      const tr = document.createElement('tr');
      const editedBy = getEditorName();

      for (let c = 0; c < COLUMNS; c++) {
        const td = document.createElement('td');
        td.dataset.index = nextIndex++;
        td.textContent = '';
        td.ondblclick = () => editCell(td);
        tr.appendChild(td);

        await fetch('/api/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            index: Number(td.dataset.index),
            value: '',
            editedBy
          })
        });
      }

      tbody.appendChild(tr);
    }

    function removeRow() {
      const tbody = document.getElementById('tableBody');
      if (!tbody.rows.length) return;
      tbody.deleteRow(-1);
      nextIndex -= COLUMNS;
    }

    window.addEventListener('DOMContentLoaded', loadData);
  </script>

  <!-- =========================
       Barcode
  ========================== -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script>
    const UNIQUE_ID = "CJ-MA-2026-02-28";
    JsBarcode("#idBarcode", UNIQUE_ID, {
      format: "CODE128",
      width: 1,
      height: 42,
      margin: 0,
      displayValue: false
    });
    document.getElementById("watermark").textContent = `ID: ${UNIQUE_ID}`;
  </script>
</body>
</html>
