<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Actuators</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="hand.png" type="image/x-icon" />

  <style>
    .dataframe td {
      cursor: pointer;
      -webkit-user-select: text;
      user-select: text;
    }

    #badge-container {
      pointer-events: none;
    }
    #table {
  position: relative;
  padding-top: 20px; /* adjust if needed */
    }

    input {
      font-size: inherit;
      font-family: inherit;
    }

    /* Animated “No results” message */
    .no-results {
      display: none;               /* hidden by default */
      margin: 10px 0;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      color: #555;
      background: #fafafa;

      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .no-results.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .no-results,
      .no-results.show {
        transition: none;
        transform: none;
      }
    }

    /* Toolbar layout  */
.toolbar {
  margin: 10px 0 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;  /* center everything */
  flex-wrap: wrap;          /* wrap on small screens */
}

.toolbarActions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.toolbarSearch {
  display: flex;
  gap: 8px;
  align-items: center;
}

.toolbarSearch input {
  padding: 8px;
  width: min(360px, 75vw);
}

/* Optional: make toolbar slightly separated from table */
#editableTable {
  margin-top: 6px;
}
/* Cell save status styles */
td.saving {
  position: relative;
  opacity: 0.75;
}

td.saving::after {
  content: "Saving…";
  position: absolute;
  right: 6px;
  top: 4px;
  font-size: 11px;
  color: #555;
  background: #fff6bf;
  border: 1px solid #f0d36a;
  padding: 2px 6px;
  border-radius: 6px;
}

td.saved::after {
  content: "Saved ✓";
  position: absolute;
  right: 6px;
  top: 4px;
  font-size: 11px;
  color: #155724;
  background: #d4edda;
  border: 1px solid #c3e6cb;
  padding: 2px 6px;
  border-radius: 6px;
}

td.save-error::after {
  content: "Error ✗";
  position: absolute;
  right: 6px;
  top: 4px;
  font-size: 11px;
  color: #721c24;
  background: #f8d7da;
  border: 1px solid #f5c6cb;
  padding: 2px 6px;
  border-radius: 6px;
}

  </style>
</head>

<body>
  <div id="table">
    <h1>List of Manual Actuators</h1>
        <!-- Toolbar: Add/Remove + Search -->
<div class="toolbar">
  <div class="toolbarActions">
  <!--  <button onclick="addRow()">➕ Add Data</button> -->
    <button type="button" onclick="openAddItemModal()">➕ Add Data</button>
    <button onclick="removeRow()">➖ Remove Last Data</button>
  </div>

  <div class="toolbarSearch">
    <input
      id="searchBox"
      type="text"
      placeholder="Search (Name / Description / Barcode)..."
      autocomplete="off"
    />
    <button type="button" onclick="clearSearch()">Clear</button>
  </div>
</div>

<!-- Animated No Results Message -->
<div id="noResultsMsg" class="no-results" role="status" aria-live="polite">
  No results found.
</div>
   

    <!-- Badge / Barcode -->
    <div id="badge-container" style="
      position:absolute;
      top:16px;
      right:20px;
      text-align:right;
    ">
      <span id="editorBadge" style="
        background:#fffb8a;
        padding:2px 6px;
        border-radius:4px;
        font-weight:600;
        display:inline-block;
      ">No User</span>

      <div><svg id="idBarcode"></svg></div>
      <div id="watermark" style="font-size:10px;color:#888;"></div>
    </div>

    <table class="dataframe" style="width:90%" id="editableTable">
      <thead>
        <tr>
          <th>NAME</th>
          <th>DESCRIPTION</th>

      </thead>

  </div>
<!-- Add Item Modal -->
<div id="addItemModal" class="modal hidden" aria-hidden="true">
  <div class="modal-backdrop" data-close="true"></div>

  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="addItemTitle">
    <div class="modal-header">
      <h3 id="addItemTitle">Add New Record</h3>

  <!-- Token Modal -->
  <div id="tokenModal" style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    align-items:center;
    justify-content:center;
    z-index:9999;
  ">
    <div style="
      background:#fff;
      padding:16px;
      border-radius:10px;
      width:min(420px, 92vw);
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    ">
      <h3 style="margin:0 0 10px;">Enter AUTH Token</h3>
      <form id="tokenForm">
        <input id="tokenInput" type="password" placeholder="Paste token here"
          style="width:100%; padding:10px; font-size:14px;" />
      
      <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px;">
        <button type="button" id="tokenCancelBtn">Cancel</button>
        <button type="button" id="tokenSaveBtn">Save</button>
      </div>
      </form>
      <div style="margin-top:8px; font-size:12px; color:#666;">
        Token is stored only in this browser.
      </div>
    </div>
  </div>
    <div id="toast" style="
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: #333;
  color: #fff;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
  z-index: 9999;
  max-width: 320px;
"></div>

  <!-- =======================
       App Logic
  ======================== -->
  <script>
    const COLUMNS = 4;
    let nextIndex = 0;

    // ===== localStorage keys =====
    const LS_AUTH_TOKEN = "authToken";
    const LS_EDITOR_NAME = "editorName";
    const LS_EDITOR_AT = "editorNameAt";

    // Reprompt editor name every hour (FIXED)
    const EDITOR_TTL_MS = 60 * 360 * 1000;

    // ===== Badge updater =====
    function updateEditorBadge() {
      const el = document.getElementById("editorBadge");
      if (!el) return;
      const name = (localStorage.getItem(LS_EDITOR_NAME) || "").trim();
      el.textContent = name || "No User";
    }

    // ===== Token helpers =====
    function authHeaders() {
      const t = (localStorage.getItem(LS_AUTH_TOKEN) || "").trim();
      return t ? { Authorization: "Bearer " + t } : {};
    }

    function clearAuthToken() {
      localStorage.removeItem(LS_AUTH_TOKEN);
    }

    function openTokenModal() {
      const modal = document.getElementById("tokenModal");
      const input = document.getElementById("tokenInput");
      const btnSave = document.getElementById("tokenSaveBtn");
      const btnCancel = document.getElementById("tokenCancelBtn");

      if (!modal || !input || !btnSave || !btnCancel) {
        alert("Token modal missing in HTML.");
        return Promise.resolve(null);
      }

      modal.style.display = "flex";
      input.value = "";
      setTimeout(() => input.focus(), 0);

      return new Promise((resolve) => {
        const cleanup = () => {
          btnSave.onclick = null;
          btnCancel.onclick = null;
          input.onkeydown = null;
        };

        btnCancel.onclick = () => {
          modal.style.display = "none";
          cleanup();
          resolve(null);
        };

      //  btnSave.onclick = () => {
        //  const token = (input.value || "").trim();
       //   if (!token) {
        //    alert("Token is required.");
       //     return;
        //  }
        //  localStorage.setItem(LS_AUTH_TOKEN, token);
       //   modal.style.display = "none";
        //  cleanup();
        //  resolve(token);
       // }; const form = document.getElementById("tokenForm");

form.onsubmit = (e) => {
  e.preventDefault();
  const token = (input.value || "").trim();
  if (!token) return alert("Token is required."); 
  localStorage.setItem(LS_AUTH_TOKEN, token); 
  modal.style.display = "none";
  cleanup();
  resolve(token);
};


        input.onkeydown = (e) => {
          if (e.key === "Enter") btnSave.click();
          if (e.key === "Escape") btnCancel.click();
        };
      });
    }

    async function ensureAuthToken() {
      const existing = (localStorage.getItem(LS_AUTH_TOKEN) || "").trim();
      if (existing) return existing;
      return await openTokenModal();
    }

    // ===== Editor TTL helpers =====
    function getEditorStamp() {
      const v = localStorage.getItem(LS_EDITOR_AT);
      const n = v ? Number(v) : 0;
      return Number.isFinite(n) ? n : 0;
    }

    function setEditorStampNow() {
      localStorage.setItem(LS_EDITOR_AT, String(Date.now()));
    }

    function clearEditorName() {
      localStorage.removeItem(LS_EDITOR_NAME);
      localStorage.removeItem(LS_EDITOR_AT);
      updateEditorBadge();
    }

    // ===== Editor selection (no list shown) =====
    async function getEditorName() {
      const now = Date.now();

      let name = (localStorage.getItem(LS_EDITOR_NAME) || "").trim();
      const last = getEditorStamp();

      if (name && last && (now - last) < EDITOR_TTL_MS) {
        return name;
      }

      while (true) {
        name = (prompt("Enter your complete name (authorized editors only):") || "").trim();
        if (!name) {
          alert("Name is required to edit.");
          continue;
        }
        localStorage.setItem(LS_EDITOR_NAME, name);
        setEditorStampNow();
        updateEditorBadge();
        return name;
      }
    }

    /* ======================
       Search Filter + No Results
    ======================= */
    function getCellText(td) {
      const input = td.querySelector("input");
      return (input ? input.value : td.textContent || "").trim();
    }

    function setNoResultsVisible(isVisible) {
      const msg = document.getElementById("noResultsMsg");
      if (!msg) return;
      if (isVisible) msg.classList.add("show");
      else msg.classList.remove("show");
    }

    function applySearchFilter() {
      const q = (document.getElementById("searchBox")?.value || "").trim().toLowerCase();
      const tbody = document.getElementById("tableBody");
      if (!tbody) return;

      let visibleCount = 0;

      for (const row of tbody.rows) {
        if (!q) {
          row.style.display = "";
          visibleCount++;
          continue;
        }

        let rowText = "";
        for (const td of row.cells) {
          rowText += " " + getCellText(td).toLowerCase();
        }

        const show = rowText.includes(q);
        row.style.display = show ? "" : "none";
        if (show) visibleCount++;
      }

      setNoResultsVisible(visibleCount === 0);
    }

    function clearSearch() {
      const box = document.getElementById("searchBox");
      if (box) box.value = "";
      applySearchFilter();
    }

    function debounce(fn, ms = 150) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), ms);
      };
    }

    // ===== Load table data =====
    async function loadData() {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      let raw = {};
      try {
        const res = await fetch("/api/data", { cache: "no-store" });
        raw = await res.json();
      } catch (e) {
        console.error("Failed to load /api/data", e);
        return;
      }

      const keys = Object.keys(raw)
        .map(k => Number(k))
        .filter(n => Number.isInteger(n));

      if (!keys.length) {
        nextIndex = 0;
        applySearchFilter();
        return;
      }

      const maxIndex = Math.max(...keys);
      const rowCount = Math.ceil((maxIndex + 1) / COLUMNS);

      for (let r = 0; r < rowCount; r++) {
        const tr = document.createElement("tr");
        const base = r * COLUMNS;

        for (let c = 0; c < COLUMNS; c++) {
          const idx = base + c;
          const td = document.createElement("td");
          td.dataset.index = idx;

          td.textContent = Object.prototype.hasOwnProperty.call(raw, String(idx))
            ? raw[String(idx)]
            : "";

          //td.ondblclick = () => editCell(td); //remove editCells
          
          tr.appendChild(td);
        }

        tbody.appendChild(tr);
      }

      nextIndex = rowCount * COLUMNS;
      applySearchFilter();
    }

    // ===== Edit cell =====
    function editCell(td) {
      if (td.querySelector("input")) return;

      const oldVal = td.textContent;
      const input = document.createElement("input");
      input.type = "text";
      input.value = oldVal;
      input.style.width = "100%";

      td.textContent = "";
      td.appendChild(input);
      setTimeout(() => input.focus(), 0);

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") input.blur();
        if (e.key === "Escape") td.textContent = oldVal;
      });

      input.addEventListener("blur", async () => {
  const newVal = input.value;
  td.textContent = newVal;

  // Ensure token
  const token = await ensureAuthToken();
  if (!token) {
    alert("Editing cancelled (no token).");
    td.textContent = oldVal;
    setCellStatus(td, "save-error");
    return;
  }

  // Ensure editor
  const editedBy = await getEditorName();

  const payload = {
    index: Number(td.dataset.index),
    value: newVal,
    editedBy
  };

  async function doSave() {
    return fetch("/api/save", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        ...authHeaders()
      },
      body: JSON.stringify(payload)
    });
  }

  // ✅ show saving once before request
  setCellStatus(td, "saving");

  try {
    let res = await doSave();

    // If token is invalid/expired → reprompt token then retry once
    if (res.status === 401) {
      clearAuthToken();
      setCellStatus(td, "save-error");
      alert("Token invalid/expired. Please enter the new token.");

      const newToken = await ensureAuthToken();
      if (!newToken) {
        td.textContent = oldVal;
        return;
      }

      // ✅ back to saving before retry
      setCellStatus(td, "saving");
      res = await doSave();
    }

    // Handle non-OK responses
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));

      if (res.status === 403) {
        clearEditorName();
        setCellStatus(td, "save-error");
        showToast("❌ Editor not allowed", 2200);
        alert("Editor not allowed. Please enter an authorized name.");
      } else {
        setCellStatus(td, "save-error");
        showToast("❌ Save failed", 2200);
        alert(err.error || "Save failed");
      }

      td.textContent = oldVal; // rollback UI
      return;
    }

    // ✅ SUCCESS: the DB commit already happened if server returns 200 OK
    setCellStatus(td, "saved");
    showToast("✅ Saved!");

  } catch (e) {
    console.error(e);
    setCellStatus(td, "save-error");
    showToast("❌ Network error", 2200);
    alert("Network error while saving.");
    td.textContent = oldVal; // rollback UI
  } finally {
    applySearchFilter();
  }
});
    }
    function addRowWithData(data) {
  const tbody = document.getElementById("tableBody");
  if (!tbody) return { startIndex: nextIndex, tds: [] };

  const tr = document.createElement("tr");

  // Order must match your table columns (COLUMNS=4)
  const values = [
    data.name || "",
    data.description || "",
    data.barcodes || "",
    data.remarks || ""
  ];

  const startIndex = nextIndex;
  const tds = [];

  values.forEach((val) => {
    const td = document.createElement("td");
    td.dataset.index = nextIndex++;      // IMPORTANT: assign index like your app expects
    td.textContent = val;
   // td.ondblclick = () => editCell(td);  // keep your existing cell editing //remove editCells
    tr.appendChild(td);
    tds.push(td);
  });

  tbody.appendChild(tr);
  applySearchFilter();
  return { startIndex, tds };
}

async function saveNewItemToServer(data, editedBy, startIndex) {
  const values = [
    data.name || "",
    data.description || "",
    data.barcodes || "",
    data.remarks || ""
  ];

  // Save each cell using your existing /api/save endpoint
  const reqs = values.map((val, i) =>
    fetch("/api/save", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        ...authHeaders()
      },
      body: JSON.stringify({
        index: startIndex + i,
        value: String(val),       // backend expects string
        editedBy: editedBy.trim()
      })
    })
  );

  const results = await Promise.all(reqs);
  const bad = results.find(r => !r.ok);

  if (bad) {
    const err = await bad.json().catch(() => ({}));
    throw new Error(err.error || `Save failed (HTTP ${bad.status})`);
  }
}
    // ===== Add row =====
    async function addRow() {
      //const token = await ensureAuthToken(); //removed token requirement for adding rows
      //if (!token) return; //

      const editor = await getEditorName();

      const tbody = document.getElementById("tableBody");
      if (!tbody) return;
      const tr = document.createElement("tr");
     
      const fields = ["name", "description", "barcodes", "remarks"];

      const tds = [];
      for (let c = 0; c < COLUMNS; c++) {
    //    const td = document.createElement("td");
      //  td.dataset.index = nextIndex++;
      //  td.textContent = "";
      //  td.ondblclick = () => editCell(td);
      //  tr.appendChild(td);
      //  tds.push(td);
      }
      
      fields.forEach((key) => {
        const td = document.createElement("td");
        td.textContent = data[key] || "";
        //td.ondblclick = () => editCell(td); // keep your existing edit behavior //remove editCells
        tr.appendChild(td);
          });

      tbody.appendChild(tr);
      applySearchFilter();

      try {
        const saves = tds.map(td =>
          fetch("/api/save", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...authHeaders()
            },
            body: JSON.stringify({
              index: Number(td.dataset.index),
              value: "",
              editedBy: editor
            })
          })
        );

        const results = await Promise.all(saves);
        const bad = results.find(r => !r.ok);

        if (bad) {
          const err = await bad.json().catch(() => ({}));
          if (bad.status === 401) {
            clearAuthToken();
            alert("Token invalid/expired. Please enter the new token.");
          } else if (bad.status === 403) {
            clearEditorName();
            alert("Editor not allowed. Please enter an authorized name.");
          } else {
            alert(err.error || "Save failed");
          }
        }
      } catch (e) {
        console.error(e);
        alert("Network error while adding row.");
      }
    }

    // ===== Remove row =====
    async function removeRow() {
      const token = await ensureAuthToken();
      if (!token) return;

      const editor = await getEditorName();

      const tbody = document.getElementById("tableBody");
      if (!tbody.rows.length) return;

      const startIndex = nextIndex - COLUMNS;

      try {
        const res = await fetch("/api/deleteRange", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...authHeaders()
          },
          body: JSON.stringify({
            startIndex,
            count: COLUMNS,
            editedBy: editor
          })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          if (res.status === 401) {
            clearAuthToken();
            alert("Token invalid/expired. Please enter the new token.");
          } else if (res.status === 403) {
            clearEditorName();
            alert("Editor not allowed. Please enter an authorized name.");
          } else {
            alert(err.error || "Delete failed");
          }
          return;
        }

        tbody.deleteRow(-1);
        nextIndex -= COLUMNS;
      } catch (e) {
        console.error(e);
        alert("Network error while deleting row.");
      } finally {
        applySearchFilter();
      }
    }

    // Expose for inline onclick
    //window.addRow = addRow;//
    window.removeRow = removeRow;
    window.clearSearch = clearSearch;

    document.addEventListener("DOMContentLoaded", () => {
      updateEditorBadge();
      loadData().then(() => {
        const box = document.getElementById("searchBox");
        if (box) box.addEventListener("input", debounce(applySearchFilter, 120));
        applySearchFilter();
      });
    });


    function setCellStatus(td, status) {
  td.classList.remove("saving", "saved", "save-error");
  if (status) td.classList.add(status);

  // Auto-clear "saved" and "error" after 1.2s
  if (status === "saved" || status === "save-error") {
    setTimeout(() => td.classList.remove("saved", "save-error"), 1200);
  }
}

function showToast(msg, ms = 1500) {
  const t = document.getElementById("toast");
  if (!t) return;
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = "none", ms);
}
      // ===== Modal helpers =====
function openAddItemModal() {
  const modal = document.getElementById("addItemModal");
  const form = document.getElementById("addItemForm");
  if (!modal || !form) return;

  form.reset();
  modal.classList.remove("hidden");
  modal.setAttribute("aria-hidden", "false");

  // focus first field
  document.getElementById("itemName")?.focus();
}

function closeAddItemModal() {
  const modal = document.getElementById("addItemModal");
  if (!modal) return;

  modal.classList.add("hidden");
  modal.setAttribute("aria-hidden", "true");
}

// Close on ESC
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeAddItemModal();
});

// Close when clicking backdrop or close/cancel
document.addEventListener("DOMContentLoaded", () => {
  const modal = document.getElementById("addItemModal");
  const cancelBtn = document.getElementById("cancelAddItemBtn");
  const closeBtn = document.getElementById("closeAddItemModalBtn");
  const form = document.getElementById("addItemForm");

  if (!modal || !form) return;

  modal.addEventListener("click", (e) => {
    if (e.target?.dataset?.close === "true") closeAddItemModal();
  });

  cancelBtn?.addEventListener("click", closeAddItemModal);
  closeBtn?.addEventListener("click", closeAddItemModal);

 
  // Handle Save (Modal)
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  // ✅ Ask editor name first (always)
  const editor = await getEditorName();

  const payload = {
    name: document.getElementById("itemName").value.trim(),
    description: document.getElementById("itemDescription").value.trim(),
    barcodes: document.getElementById("itemBarcodes").value.trim(),
    remarks: document.getElementById("itemRemarks").value.trim(),
  };

  // 1) Add row to UI immediately and capture index start
  const { startIndex } = addRowWithData(payload);

  // 2) Save to backend (4 calls to /api/save) WITHOUT prompting token first
  try {
    await saveNewItemToServerWithRetry(payload, editor, startIndex);
    closeAddItemModal();
    showToast("✅ Added!");
  } catch (err) {
    console.error(err);
    alert("Failed to save: " + err.message);
  }
});
});
async function saveNewItemToServerWithRetry(data, editedBy, startIndex) {
  const values = [
    data.name || "",
    data.description || "",
    data.barcodes || "",
    data.remarks || ""
  ];

  const doSave = () => {
    const reqs = values.map((val, i) =>
      fetch("/api/save", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...authHeaders() // ✅ uses existing token ONLY (no prompt)
        },
        body: JSON.stringify({
          index: startIndex + i,
          value: String(val),
          editedBy: editedBy.trim() // ✅ captured editor name
        })
      })
    );
    return Promise.all(reqs);
  };

  // First attempt (no prompting)
  let results = await doSave();

  // If any request is unauthorized, THEN ask for token and retry once
  const unauthorized = results.find(r => r.status === 401);
  if (unauthorized) {
    clearAuthToken();
    alert("Token invalid/expired. Please enter a new token.");
    const token = await ensureAuthToken(); // ✅ prompt only now
    if (!token) throw new Error("No token provided.");

    results = await doSave(); // retry after token
  }

  // Handle forbidden editor (403)
  const forbidden = results.find(r => r.status === 403);
  if (forbidden) {
    clearEditorName();
    throw new Error("Editor not allowed. Please enter an authorized name.");
  }

  // Any other error
  const bad = results.find(r => !r.ok);
  if (bad) {
    const err = await bad.json().catch(() => ({}));
    throw new Error(err.error || `Save failed (HTTP ${bad.status})`);
  }

  return true;
}
